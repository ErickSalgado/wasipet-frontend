<div
    class="bg-wp-champagne rounded-xl p-4 sm:p-6 mb-8 shadow-sm border-t-4 border-wp-robin transition-all duration-300">
    <h3 class="text-lg sm:text-xl font-bold text-wp-space mb-4 sm:mb-6">
        {{ pet()?.id ? 'Editar Mascota' : 'Registrar Nueva Mascota' }}
    </h3>

    <form [formGroup]="petForm" (ngSubmit)="onSubmit()">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 sm:gap-6 mb-6">

            <div class="flex flex-col">
                <label for="name" class="text-xs sm:text-sm font-bold text-wp-space opacity-80 mb-1 sm:mb-2">Nombre de
                    la Mascota *</label>
                <input id="name" type="text" formControlName="name" placeholder="Ej: Firulais"
                    class="w-full px-3 py-2 sm:px-4 sm:py-2 text-sm sm:text-base border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-wp-robin focus:border-transparent transition-all bg-white text-wp-space">
            </div>

            <div class="flex flex-col">
                <label for="clientId" class="text-xs sm:text-sm font-bold text-wp-space opacity-80 mb-1 sm:mb-2">Dueño
                    (Cliente) *</label>
                <select id="clientId" formControlName="clientId"
                    class="w-full px-3 py-2 sm:px-4 sm:py-2 text-sm sm:text-base border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-wp-robin focus:border-transparent transition-all bg-white text-wp-space appearance-none">
                    <option value="" disabled selected>Seleccione un dueño...</option>
                    @for (client of mergedClients(); track client.id) {
                    <option [value]="client.id">{{ client.firstName }} {{ client.lastName }} ({{ client.documentId ||
                        'Sin doc' }})</option>
                    }
                </select>
            </div>

            <div class="flex flex-col">
                <label for="species" class="text-xs sm:text-sm font-bold text-wp-space opacity-80 mb-1 sm:mb-2">Especie
                    *</label>
                <select id="species" formControlName="species"
                    class="w-full px-3 py-2 sm:px-4 sm:py-2 text-sm sm:text-base border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-wp-robin focus:border-transparent transition-all bg-white text-wp-space appearance-none">
                    <option value="DOG">Perro</option>
                    <option value="CAT">Gato</option>
                    <option value="OTHER">Otro</option>
                </select>
            </div>

            <div class="flex flex-col">
                <label for="sex" class="text-xs sm:text-sm font-bold text-wp-space opacity-80 mb-1 sm:mb-2">Sexo</label>
                <select id="sex" formControlName="sex"
                    class="w-full px-3 py-2 sm:px-4 sm:py-2 text-sm sm:text-base border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-wp-robin focus:border-transparent transition-all bg-white text-wp-space appearance-none">
                    <option value="MALE">Macho</option>
                    <option value="FEMALE">Hembra</option>
                </select>
            </div>

            <div class="flex flex-col">
                <label for="breed"
                    class="text-xs sm:text-sm font-bold text-wp-space opacity-80 mb-1 sm:mb-2">Raza</label>
                <input id="breed" type="text" formControlName="breed" placeholder="Ej: Golden Retriever"
                    class="w-full px-3 py-2 sm:px-4 sm:py-2 text-sm sm:text-base border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-wp-robin focus:border-transparent transition-all bg-white text-wp-space">
            </div>

            <div class="flex flex-col">
                <label for="color"
                    class="text-xs sm:text-sm font-bold text-wp-space opacity-80 mb-1 sm:mb-2">Color</label>
                <input id="color" type="text" formControlName="color" placeholder="Ej: Blanco con manchas"
                    class="w-full px-3 py-2 sm:px-4 sm:py-2 text-sm sm:text-base border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-wp-robin focus:border-transparent transition-all bg-white text-wp-space">
            </div>

            <div class="flex flex-col">
                <label for="age" class="text-xs sm:text-sm font-bold text-wp-space opacity-80 mb-1 sm:mb-2">Edad</label>
                <input id="age" type="text" formControlName="age" placeholder="Ej: 3 años / 5 meses"
                    class="w-full px-3 py-2 sm:px-4 sm:py-2 text-sm sm:text-base border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-wp-robin focus:border-transparent transition-all bg-white text-wp-space">
            </div>

            <div class="flex flex-col">
                <label for="weight" class="text-xs sm:text-sm font-bold text-wp-space opacity-80 mb-1 sm:mb-2">Peso
                    (kg)</label>
                <input id="weight" type="number" step="0.1" formControlName="weight" placeholder="Ej: 12.5"
                    class="w-full px-3 py-2 sm:px-4 sm:py-2 text-sm sm:text-base border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-wp-robin focus:border-transparent transition-all bg-white text-wp-space">
            </div>

            <div class="flex flex-col md:col-span-2">
                <label for="medicalNotes"
                    class="text-xs sm:text-sm font-bold text-wp-space opacity-80 mb-1 sm:mb-2">Notas Médicas /
                    Alergias</label>
                <textarea id="medicalNotes" formControlName="medicalNotes" rows="2"
                    placeholder="Ej: Alérgico a la penicilina..."
                    class="w-full px-3 py-2 sm:px-4 sm:py-2 text-sm sm:text-base border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-wp-robin focus:border-transparent transition-all bg-white text-wp-space resize-none"></textarea>
            </div>

            <div class="flex flex-col md:col-span-2">
                <label for="dietNotes" class="text-xs sm:text-sm font-bold text-wp-space opacity-80 mb-1 sm:mb-2">Dieta
                    Especial</label>
                <textarea id="dietNotes" formControlName="dietNotes" rows="2"
                    placeholder="Ej: Solo come croquetas hipoalergénicas..."
                    class="w-full px-3 py-2 sm:px-4 sm:py-2 text-sm sm:text-base border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-wp-robin focus:border-transparent transition-all bg-white text-wp-space resize-none"></textarea>
            </div>

            <div class="flex flex-col md:col-span-2 lg:col-span-4">
                <label for="generalNotes"
                    class="text-xs sm:text-sm font-bold text-wp-space opacity-80 mb-1 sm:mb-2">Comportamiento / Notas
                    Generales</label>
                <textarea id="generalNotes" formControlName="generalNotes" rows="2"
                    placeholder="Ej: Miedo a los truenos, no le gustan otros gatos..."
                    class="w-full px-3 py-2 sm:px-4 sm:py-2 text-sm sm:text-base border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-wp-robin focus:border-transparent transition-all bg-white text-wp-space resize-y"></textarea>
            </div>

            <!-- Control de Estado (Soft Delete) - Solo visible en Edición -->
            @if (pet()?.id) {
            <div class="flex flex-col md:col-span-2 lg:col-span-4 bg-white p-4 rounded-lg border border-gray-200 mt-2">
                <label class="inline-flex items-center cursor-pointer">
                    <input type="checkbox" formControlName="isActive" class="sr-only peer">
                    <div class="relative w-11 h-6 bg-gray-200 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-wp-robin/30 rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-wp-robin"></div>
                    <span class="ms-3 text-sm font-bold text-wp-space">
                        Estado: <span [class.text-wp-robin]="petForm.get('isActive')?.value" [class.text-gray-500]="!petForm.get('isActive')?.value">{{ petForm.get('isActive')?.value ? 'Activo' : 'Inactivo' }}</span>
                    </span>
                </label>
                <p class="text-xs text-gray-500 mt-2">Si desactiva este registro, ya no aparecerá en las búsquedas o listas de selección (Soft Delete).</p>
            </div>
            }
        </div>

        <div class="flex flex-col sm:flex-row justify-end gap-3 sm:gap-4 mt-4">
            <button type="button" (click)="cancelForm.emit()"
                class="w-full sm:w-auto flex justify-center items-center gap-2 px-6 py-2.5 sm:py-2 border border-gray-400 text-wp-space font-bold rounded-lg hover:bg-black/5 transition-all">
                <span class="material-icons text-base" translate="no">close</span>
                Cancelar
            </button>
            <button type="submit" [disabled]="petForm.invalid"
                class="w-full sm:w-auto justify-center px-6 py-2.5 sm:py-2 bg-wp-robin text-wp-space font-bold rounded-lg shadow-md hover:-translate-y-0.5 hover:shadow-lg transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2">
                <span class="material-icons text-sm" translate="no">save</span>
                {{ pet()?.id ? 'Actualizar' : 'Guardar' }}
            </button>
        </div>
    </form>
</div>
