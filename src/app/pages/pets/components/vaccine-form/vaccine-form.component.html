<div class="bg-wp-champagne rounded-xl p-6 shadow-sm border-t-4 border-wp-robin">
    <h3 class="text-xl font-bold text-wp-space mb-4">
        {{ vaccine()?.id ? 'Editar Registro' : 'Nueva Vacuna/Desparasitación' }}
    </h3>

    <form [formGroup]="vaccineForm" (ngSubmit)="onSubmit()" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div class="flex flex-col sm:col-span-2 mb-2">
            <label class="text-sm font-bold text-wp-space opacity-80 mb-1" for="cboMascota">Mascota Paciente
                *</label>
            <select id="cboMascota" formControlName="petId"
                class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-wp-robin outline-none bg-white">
                <option value="" disabled selected>Selecciona una mascota...</option>
                @for (pet of pets(); track pet.id) {
                <option [value]="pet.id">{{ pet.name }} ({{ pet.species }})</option>
                }
            </select>
        </div>
        <div class="flex flex-col sm:col-span-2">
            <label class="text-sm font-bold text-wp-space opacity-80 mb-1" for="txtNombre">Tratamiento o Vacuna
                *</label>
            <input id="txtNombre" type="text" formControlName="name" placeholder="Ej: Múltiple, Rabia, Bravecto..."
                class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-wp-robin outline-none">
        </div>

        <div class="flex flex-col">
            <label class="text-sm font-bold text-wp-space opacity-80 mb-1" for="txtFechaAplicacion">Fecha de
                Aplicación *</label>
            <input id="txtFechaAplicacion" type="date" formControlName="applicationDate"
                class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-wp-robin outline-none">
        </div>

        <div class="flex flex-col">
            <label class="text-sm font-bold text-wp-space opacity-80 mb-1" for="txtProximaDosis">Próxima Dosis
                (Opcional)</label>
            <input id="txtProximaDosis" type="date" formControlName="nextDoseDate"
                class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-wp-robin outline-none">
        </div>

        <div class="flex flex-col sm:col-span-2">
            <label class="text-sm font-bold text-wp-space opacity-80 mb-1" for="txtVeterinario">Veterinario
                (Opcional)</label>
            <input id="txtVeterinario" type="text" formControlName="veterinarian"
                placeholder="Nombre del doctor/clínica"
                class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-wp-robin outline-none">
        </div>

        <div class="flex flex-col sm:col-span-2">
            <label class="text-sm font-bold text-wp-space opacity-80 mb-1" for="txtNotas">Observaciones
                (Opcional)</label>
            <textarea formControlName="notes" rows="2" placeholder="Ej: Presentó un poco de alergia" id="txtNotas"
                class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-wp-robin outline-none"></textarea>
        </div>

        <div class="flex justify-end gap-3 sm:col-span-2 mt-2">
            <button type="button" (click)="cancelForm.emit()"
                class="px-6 py-2 border border-gray-400 text-wp-space font-bold rounded-lg hover:bg-black/5">
                Cancelar
            </button>
            <button type="submit" [disabled]="vaccineForm.invalid"
                class="px-6 py-2 bg-wp-robin text-wp-space font-bold rounded-lg shadow-md hover:-translate-y-0.5 disabled:opacity-50">
                Guardar
            </button>
        </div>
    </form>
</div>
