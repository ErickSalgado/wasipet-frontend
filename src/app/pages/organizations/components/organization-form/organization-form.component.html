<div class="bg-wp-champagne rounded-xl p-4 sm:p-6 shadow-sm border-t-4 border-wp-robin transition-all duration-300">
    <h3 class="text-lg sm:text-xl font-bold text-wp-space mb-4 sm:mb-6">
        {{ org()?.id ? 'Editar Organización' : 'Registrar Nueva Organización' }}
    </h3>

    <form [formGroup]="orgForm" (ngSubmit)="onSubmit()">
        <div class="flex flex-col mb-6">
            <label for="name" class="text-xs sm:text-sm font-bold text-wp-space opacity-80 mb-1 sm:mb-2">Nombre
                Comercial de la Empresa *</label>
            <input id="name" type="text" formControlName="name" placeholder="Ej: Clínica Veterinaria San Roque"
                class="w-full px-3 py-2 sm:px-4 sm:py-2 text-sm sm:text-base border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-wp-robin focus:border-transparent bg-white text-wp-space">
        </div>

        <div class="flex flex-col sm:flex-row justify-end gap-3 sm:gap-4 mt-4">
            <button type="button" (click)="cancelForm.emit()"
                class="w-full sm:w-auto flex justify-center items-center gap-2 px-6 py-2.5 sm:py-2 border border-gray-400 text-wp-space font-bold rounded-lg hover:bg-black/5 transition-all">
                <span class="material-icons text-base" translate="no">close</span>
                Cancelar
            </button>
            <button type="submit" [disabled]="orgForm.invalid"
                class="w-full sm:w-auto justify-center px-6 py-2.5 sm:py-2 bg-wp-robin text-wp-space font-bold rounded-lg shadow-md hover:-translate-y-0.5 transition-all disabled:opacity-50 flex items-center gap-2">
                <span class="material-icons text-sm" translate="no">save</span>
                {{ org()?.id ? 'Actualizar' : 'Guardar' }}
            </button>
        </div>
    </form>
</div>
