<div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 sm:mb-8 gap-4">
    <div>
        <h2 class="text-2xl sm:text-3xl font-bold text-wp-space mb-1">Directorio de Clientes</h2>
        <p class="text-sm sm:text-base text-wp-space opacity-70">Gestiona los dueños de las mascotas de tu sucursal</p>
    </div>

    @if (!showForm()) {
    <button (click)="toggleForm()"
        class="w-full sm:w-auto flex justify-center items-center gap-2 px-5 py-2.5 bg-wp-robin text-wp-space font-bold rounded-lg shadow-md hover:-translate-y-0.5 hover:shadow-lg transition-all">
        <span class="material-icons">person_add</span>
        Nuevo Cliente
    </button>
    }
</div>

@if (showForm()) {
    <app-client-form 
        [client]="editingClient()" 
        (closeForm)="toggleForm()" 
        (save)="saveClient($event)">
    </app-client-form>
} @else {
    <app-client-list 
        [clients]="clients()" 
        [isLoading]="isLoading()"
        (edit)="editClient($event)" 
        (delete)="deleteClient($event)">
    </app-client-list>
}
