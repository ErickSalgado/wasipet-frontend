<div class="flex h-screen bg-wp-platinum overflow-hidden">

  <aside
    class="hidden md:flex flex-col h-full bg-wp-space shrink-0 transition-all duration-300 relative overflow-hidden"
    [style.width]="layoutService.isCollapsed ? '80px' : '256px'">
    <app-sidebar class="w-full h-full"></app-sidebar>
  </aside>

  <main class="flex-1 flex flex-col h-full w-full overflow-hidden">

    <header class="h-16 shrink-0 bg-wp-champagne shadow-sm z-10 flex items-center px-4">
      <button (click)="layoutService.toggleSidebar()"
        class="md:hidden p-2 mr-2 text-wp-space rounded-md hover:bg-black/5">
        <span class="material-icons">menu</span>
      </button>

      <app-header class="flex-1"></app-header>
    </header>

    <div class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
