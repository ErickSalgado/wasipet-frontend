<div class="flex h-screen bg-wp-platinum overflow-hidden relative">

  @if (!layoutService.isCollapsed) {
    <div (click)="layoutService.toggleSidebar()"
         class="fixed inset-0 bg-black/50 z-40 md:hidden transition-opacity duration-300">
    </div>
  }

  <aside class="fixed md:relative inset-y-0 left-0 z-50 h-full bg-wp-space shrink-0 transition-all duration-300 overflow-hidden shadow-2xl md:shadow-none"
         [class.-translate-x-full]="layoutService.isCollapsed"
         [class.translate-x-0]="!layoutService.isCollapsed"
         [class.md:translate-x-0]="true"
         [class.w-64]="true"
         [class.md:w-20]="layoutService.isCollapsed"
         [class.md:w-64]="!layoutService.isCollapsed">
    <app-sidebar class="w-full h-full"></app-sidebar>
  </aside>

  <main class="flex-1 flex flex-col h-full min-w-0 overflow-hidden">
    
    <header class="h-16 shrink-0 bg-wp-champagne shadow-sm z-10 flex items-center px-4">
      <button (click)="layoutService.toggleSidebar()"
        class="md:hidden p-2 mr-2 text-wp-space rounded-md hover:bg-black/5">
        <span class="material-icons">menu</span>
      </button>

      <app-header class="flex-1"></app-header>
    </header>

    <div class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
